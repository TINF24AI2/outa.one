[changelog]
header = ""
body = """
{% if version %}## {{ version }} — {{ timestamp | date(format="%Y-%m-%d") }}{% endif %}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }} \
  ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/TINF24AI2/outa.one/commit/{{ commit.id }}))
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true  # hides commits that don't follow conventional format
tag_pattern = "v[0-9].*"     # only considers tags starting with v

commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->🚀 Features" },
  { message = "^fix", group = "<!-- 1 -->🐞 Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->🔥 Performance" },
  { message = "^refactor", group = "<!-- 3 -->♻️ Refactoring" },
  { message = "^docs", group = "<!-- 4 -->📖 Documentation" },
  { message = "^chore|^ci|^build|^test", skip = true },  # skip noise
]